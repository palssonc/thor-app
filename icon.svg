<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">Thor hammer barbell app icon</title>
  <desc id="desc">A square app icon showing Thor's hammer fused with a barbell: leather-wrapped handle and stacked cracked iron weight plates forming the hammer head.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252525"/>
      <stop offset="0.55" stop-color="#111111"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6c1b7"/>
      <stop offset="0.25" stop-color="#696760"/>
      <stop offset="0.52" stop-color="#e0dbcf"/>
      <stop offset="0.78" stop-color="#3b3a37"/>
      <stop offset="1" stop-color="#9a968d"/>
    </linearGradient>
    <linearGradient id="darkSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#282827"/>
      <stop offset="0.5" stop-color="#77746d"/>
      <stop offset="1" stop-color="#161615"/>
    </linearGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b3b2d"/>
      <stop offset="0.45" stop-color="#3a211a"/>
      <stop offset="1" stop-color="#8a5544"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="inner" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#fff" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="-4" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <pattern id="speckle" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="8" r="1.4" fill="#fff" opacity=".22"/>
      <circle cx="21" cy="16" r="1" fill="#000" opacity=".38"/>
      <circle cx="28" cy="5" r="1.1" fill="#fff" opacity=".13"/>
      <circle cx="12" cy="29" r="1.3" fill="#000" opacity=".3"/>
    </pattern>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="205" fill="url(#bg)"/>
  <rect x="53" y="53" width="918" height="918" rx="184" fill="none" stroke="url(#steel)" stroke-width="34" opacity=".85"/>
  <rect x="82" y="82" width="860" height="860" rx="157" fill="none" stroke="#000" stroke-width="18" opacity=".45"/>

  <!-- faint cracked stone background -->
  <g opacity=".28" fill="none" stroke="#777" stroke-width="4" stroke-linecap="round">
    <path d="M201 197c54 46 102 54 145 24 27 49 67 74 119 75"/>
    <path d="M185 683c79-47 148-51 207-13 34-80 83-121 147-125"/>
    <path d="M654 141c-39 72-37 134 5 187 70 5 124 35 161 90"/>
    <path d="M802 786c-69-10-120 8-153 55-45-45-99-57-162-37"/>
  </g>

  <g filter="url(#shadow)">
    <!-- end leather loop -->
    <ellipse cx="177" cy="510" rx="70" ry="154" fill="none" stroke="#5b3128" stroke-width="25"/>
    <ellipse cx="177" cy="510" rx="55" ry="133" fill="none" stroke="#a06a56" stroke-width="5" opacity=".55"/>

    <!-- ornate pommel -->
    <path d="M237 455c29 0 53 24 53 55s-24 55-53 55c-22 0-41-14-49-34v-42c8-20 27-34 49-34z" fill="url(#steel)" stroke="#1d1d1c" stroke-width="7"/>
    <path d="M212 492c31 8 46 23 51 44M216 531c22-18 37-36 47-56M236 469c13 19 25 38 36 57" fill="none" stroke="#262522" stroke-width="6" opacity=".65"/>

    <!-- leather wrapped barbell/hammer handle -->
    <rect x="262" y="473" width="410" height="74" rx="34" fill="url(#leather)" stroke="#1b0f0c" stroke-width="8"/>
    <g stroke="url(#steel)" stroke-width="10" opacity=".95">
      <path d="M300 471l-20 78"/><path d="M344 471l-20 78"/><path d="M388 471l-20 78"/><path d="M432 471l-20 78"/>
      <path d="M476 471l-20 78"/><path d="M520 471l-20 78"/><path d="M564 471l-20 78"/><path d="M608 471l-20 78"/>
      <path d="M652 471l-20 78"/>
    </g>
    <path d="M282 492h358" stroke="#bb8068" stroke-width="4" opacity=".35"/>

    <!-- hammer head as stacked plates -->
    <g transform="translate(636 306)">
      <ellipse cx="232" cy="205" rx="68" ry="204" fill="url(#darkSteel)" stroke="#161616" stroke-width="8"/>
      <rect x="0" y="0" width="250" height="410" rx="36" fill="url(#steel)" stroke="#171717" stroke-width="10" filter="url(#inner)"/>
      <rect x="44" y="2" width="72" height="406" rx="25" fill="url(#darkSteel)" stroke="#090909" stroke-width="8" opacity=".98"/>
      <rect x="122" y="2" width="72" height="406" rx="25" fill="url(#darkSteel)" stroke="#090909" stroke-width="8" opacity=".98"/>
      <rect x="200" y="3" width="60" height="404" rx="25" fill="url(#darkSteel)" stroke="#090909" stroke-width="8" opacity=".98"/>
      <rect x="0" y="0" width="250" height="410" rx="36" fill="url(#speckle)" opacity=".55"/>
      <!-- outer cap -->
      <ellipse cx="258" cy="205" rx="66" ry="177" fill="url(#steel)" stroke="#101010" stroke-width="9"/>
      <ellipse cx="258" cy="205" rx="37" ry="112" fill="#2a2927" stroke="#bcb6aa" stroke-width="7" opacity=".93"/>
      <path d="M242 125c26 24 40 52 41 83-20 18-34 42-44 72M280 121c-23 38-29 70-17 97 17 36 16 71-2 105" fill="none" stroke="#d4cec0" stroke-width="5" opacity=".43"/>
      <!-- celtic-ish glyph -->
      <path d="M258 141c45 35 45 93 0 129-44-36-44-94 0-129zM226 204h64M244 165c28 25 29 53 0 80M272 165c-28 25-29 53 0 80" fill="none" stroke="#0d0d0d" stroke-width="6" opacity=".8"/>
      <!-- cracks -->
      <g fill="none" stroke="#171717" stroke-width="5" stroke-linecap="round" opacity=".78">
        <path d="M20 64l45 53-19 38 31 40"/>
        <path d="M114 34l22 82-20 50 25 43"/>
        <path d="M185 55l-28 64 29 50-20 82"/>
        <path d="M55 276l44-40 47 16 35-39"/>
        <path d="M32 345l70-38 66 22 65-48"/>
        <path d="M231 103l42 58-18 58 36 49"/>
      </g>
      <g fill="none" stroke="#eee7d8" stroke-width="3" stroke-linecap="round" opacity=".36">
        <path d="M23 58l44 52M119 31l19 78M188 54l-25 59M59 273l39-35"/>
      </g>
    </g>
  </g>

  <!-- icon polish -->
  <rect x="32" y="32" width="960" height="960" rx="205" fill="none" stroke="#ffffff" stroke-width="2" opacity=".18"/>
</svg>
